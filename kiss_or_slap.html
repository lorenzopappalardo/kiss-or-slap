<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiss or Slap</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
        padding: 20px;
    }

    h1 {
        color: #333;
    }

    img {
        width: 300px;
        max-width: 90%;
        border-radius: 12px;
        margin: 20px 0;
    }

    .wheel {
        width: 250px;
        height: 250px;
        border: 10px solid #333;
        border-radius: 50%;
        margin: 20px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(45deg,#ffb6c1,#87cefa);
        transition: transform 4s ease-out;
        font-size: 22px;
        font-weight: bold;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
    }

    #result {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>Kiss or Slap 🎯</h1>

<p>Gira la ruota e scopri chi viene scelto!</p>

<img src="https://via.placeholder.com/300x200.png?text=La+Tua+Foto" alt="Foto">

<div class="wheel" id="wheel">🎡</div>

<button onclick="spinWheel()">Gira la ruota</button>

<div id="result"></div>

<script>
const names = [
    "Marco",
    "Piero",
    "Lorenzo",
    "Giuliano",
    "SpacchiPeppe",
    "Melo",
    "Steppa"
];

let rotation = 0;

function spinWheel() {
    const wheel = document.getElementById("wheel");

    rotation += 1440 + Math.floor(Math.random() * 360);
    wheel.style.transform = `rotate(${rotation}deg)`;

    const selected = names[Math.floor(Math.random() * names.length)];

    setTimeout(() => {
        document.getElementById("result").innerHTML =
            `✨ È uscito: <strong>${selected}</strong> ✨`;
    }, 4000);
}
</script>

</body>
</html>
