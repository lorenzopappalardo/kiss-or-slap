<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiss or Slap</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1,h2{
    margin:10px 0;
}

img{
    width:300px;
    max-width:90%;
    border-radius:15px;
}

/* schermate */
.screen{
    display:none;
}

.active{
    display:block;
    animation:fadeIn .7s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* bottoni */
button{
    padding:12px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    color:white;
}

.yes{ background:#4CAF50; }
.no{ background:#e74c3c; }

/* ruota */
.container{
    position:relative;
    width:500px;
    max-width:95vw;
    margin:20px auto;
}

svg{
    width:100%;
    transition:transform 5s cubic-bezier(.17,.67,.12,.99);
}

.pointer{
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:35px solid red;
    z-index:10;
}

.spin-btn{
    background:#ff69b4;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen active">

<h1>Should he marry her? 💍</h1>

<img src="coppia.png">

<div>
    <button class="yes" onclick="startGame()">YES</button>
    <button class="no" onclick="startGame()">NO</button>
</div>

</div>

<!-- GIOCO -->
<div id="game" class="screen">

<h2>btw, let's play with us<br>kiss or slap? 😘👋</h2>

<div class="container">
    <div class="pointer"></div>
    <svg id="wheel" viewBox="0 0 500 500"></svg>
</div>

<button class="spin-btn" onclick="spin()">SPIN HONEY 🍯</button>

</div>

<script>

const names = [
 "Marco","Piero","Lorenzo","Giuliano",
 "SpacchiPeppe","Melo","Steppa"
];

const colors = [
 "#ff7675","#74b9ff","#55efc4",
 "#ffeaa7","#fd79a8","#a29bfe","#fab1a0"
];

const svg = document.getElementById("wheel");
const center = 250;
const radius = 220;
const slice = 360 / names.length;

let rotation = 0;

/* costruzione ruota */
names.forEach((name, i) => {

    const start = slice * i;
    const end = start + slice;

    const x1 = center + radius * Math.cos(Math.PI * start / 180);
    const y1 = center + radius * Math.sin(Math.PI * start / 180);

    const x2 = center + radius * Math.cos(Math.PI * end / 180);
    const y2 = center + radius * Math.sin(Math.PI * end / 180);

    const path = document.createElementNS("http://www.w3.org/2000/svg","path");

    path.setAttribute("d", `
        M ${center} ${center}
        L ${x1} ${y1}
        A ${radius} ${radius} 0 0 1 ${x2} ${y2}
        Z
    `);

    path.setAttribute("fill", colors[i]);
    path.setAttribute("stroke","white");

    svg.appendChild(path);

    const textAngle = start + slice/2;
    const tx = center + 140 * Math.cos(Math.PI * textAngle / 180);
    const ty = center + 140 * Math.sin(Math.PI * textAngle / 180);

    const text = document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x", tx);
    text.setAttribute("y", ty);
    text.setAttribute("text-anchor","middle");
    text.setAttribute("font-size","16");
    text.setAttribute("font-weight","bold");
    text.textContent = name;

    svg.appendChild(text);
});

/* cambia schermata */
function startGame(){
    document.getElementById("intro").classList.remove("active");
    document.getElementById("game").classList.add("active");
}

/* spin SENZA stampare vincitore */
function spin(){

    const winner = Math.floor(Math.random() * names.length);
    const anglePerSlice = 360 / names.length;

    const target =
        360 * 6 +
        (360 - winner * anglePerSlice - anglePerSlice/2);

    rotation += target;

    svg.style.transform = `rotate(${rotation}deg)`;

}

</script>

</body>
</html>
